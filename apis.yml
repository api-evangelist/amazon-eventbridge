name: Amazon EventBridge
description: >-
  Amazon EventBridge is a serverless event bus service that makes it easy to
  connect your applications with data from a variety of sources. EventBridge
  delivers a stream of real-time data from your own applications, Software as a
  Service (SaaS) applications, and AWS services and routes that data to targets
  such as AWS Lambda, Amazon SNS, Amazon SQS, and more. EventBridge simplifies
  the process of building event-driven architectures by decoupling event
  producers and consumers.
url: https://aws.amazon.com/eventbridge/
baseURL: https://events.amazonaws.com
tags:
  - AWS
  - Event Bus
  - Event-Driven
